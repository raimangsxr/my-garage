<button
    *ngIf="clickable; else staticCard"
    type="button"
    class="entity-card entity-card--button clickable"
    (click)="onClick()"
    (keydown.enter)="onKeyActivate($event)"
    (keydown.space)="onKeyActivate($event)">
    <ng-content></ng-content>
</button>

<ng-template #staticCard>
    <div class="entity-card">
        <ng-content></ng-content>
    </div>
</ng-template>

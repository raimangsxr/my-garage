apiVersion: v1
kind: Service
metadata:
  name: my-garage-backend
  namespace: my-garage
  labels:
    app.kubernetes.io/name: my-garage-backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: my-garage-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-garage-backend
  namespace: my-garage
  labels:
    app.kubernetes.io/name: my-garage-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: my-garage-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: my-garage-backend
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: ghcr.io/your-org/my-garage-backend:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: my-garage-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: my-garage-secrets
                  key: JWT_SECRET
            - name: SECRET_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: my-garage-secrets
                  key: SECRET_ENCRYPTION_KEY
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: my-garage-config
                  key: FRONTEND_URL
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: my-garage-config
                  key: CORS_ORIGINS
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: media
              mountPath: /app/media
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: my-garage-backend-media
        - name: tmp
          emptyDir: {}

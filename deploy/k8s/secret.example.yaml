apiVersion: v1
kind: Secret
metadata:
  name: my-garage-secrets
  namespace: my-garage
  labels:
    app.kubernetes.io/name: my-garage
type: Opaque
stringData:
  DATABASE_URL: "postgresql+psycopg2://mygarage:change-me-db-password@postgres.example.internal:5432/mygarage"
  JWT_SECRET: "change-me-jwt-secret"
  SECRET_ENCRYPTION_KEY: "change-me-app-secret-key"
